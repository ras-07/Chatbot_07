<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900" width="400" height="900">
  <rect width="400" height="900" fill="#111e16"/>

  <!-- Large outer rings top -->
  <circle cx="80" cy="140" r="110" fill="none" stroke="#1e3a28" stroke-width="1.5"/>
  <circle cx="80" cy="140" r="80" fill="none" stroke="#254d34" stroke-width="1"/>
  <circle cx="80" cy="140" r="52" fill="#1a3224" opacity="0.95"/>
  <circle cx="80" cy="140" r="28" fill="#223d2c"/>

  <!-- Rotated squares top -->
  <rect x="150" y="60" width="100" height="100" rx="4" fill="none" stroke="#1e3a28" stroke-width="1" transform="rotate(18 200 110)"/>
  <rect x="170" y="80" width="60" height="60" rx="4" fill="none" stroke="#2d5c3a" stroke-width="0.8" transform="rotate(18 200 110)"/>

  <!-- Thin horizontal rule -->
  <line x1="0" y1="280" x2="400" y2="280" stroke="#1a3224" stroke-width="0.8"/>

  <!-- Mid section cluster -->
  <circle cx="300" cy="360" r="70" fill="#162a1e" opacity="0.95"/>
  <circle cx="300" cy="360" r="48" fill="none" stroke="#2d5c3a" stroke-width="1"/>
  <circle cx="300" cy="360" r="26" fill="#1e3a28"/>

  <circle cx="60" cy="420" r="40" fill="none" stroke="#1e3a28" stroke-width="1.2"/>
  <circle cx="60" cy="420" r="20" fill="#1a3224"/>

  <!-- Diagonal connector line -->
  <line x1="60" y1="380" x2="260" y2="310" stroke="#1e3a28" stroke-width="0.6"/>
  <line x1="100" y1="450" x2="280" y2="400" stroke="#223d2c" stroke-width="0.5"/>

  <!-- Rotated rect mid -->
  <rect x="30" y="500" width="120" height="120" rx="4" fill="none" stroke="#1e3a28" stroke-width="1" transform="rotate(-12 90 560)"/>
  <rect x="50" y="520" width="80" height="80" rx="4" fill="none" stroke="#254d34" stroke-width="0.7" transform="rotate(-12 90 560)"/>

  <!-- Horizontal rule mid -->
  <line x1="0" y1="620" x2="400" y2="620" stroke="#1a3224" stroke-width="0.8"/>

  <!-- Bottom cluster -->
  <circle cx="200" cy="720" r="90" fill="#162a1e" opacity="0.9"/>
  <circle cx="200" cy="720" r="64" fill="none" stroke="#254d34" stroke-width="1"/>
  <circle cx="200" cy="720" r="38" fill="#1e3a28"/>
  <circle cx="200" cy="720" r="16" fill="#2d5c3a" opacity="0.8"/>

  <!-- Small accent dots scattered -->
  <circle cx="340" cy="200" r="5" fill="#2d5c3a" opacity="0.7"/>
  <circle cx="360" cy="480" r="4" fill="#254d34" opacity="0.6"/>
  <circle cx="30" cy="650" r="6" fill="#1e3a28" opacity="0.9"/>
  <circle cx="370" cy="700" r="4" fill="#2d5c3a" opacity="0.5"/>
  <circle cx="80" cy="840" r="5" fill="#254d34" opacity="0.6"/>
  <circle cx="330" cy="850" r="7" fill="#1e3a28" opacity="0.8"/>

  <!-- Corner accent rect bottom right -->
  <rect x="290" y="800" width="80" height="80" rx="4" fill="none" stroke="#1e3a28" stroke-width="1" transform="rotate(10 330 840)"/>

  <!-- Final horizontal rule -->
  <line x1="0" y1="870" x2="400" y2="870" stroke="#1a3224" stroke-width="0.8"/>
</svg>
